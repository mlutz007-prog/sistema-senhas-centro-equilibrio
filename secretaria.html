<script type="module">
import { supabase } from './js/supabase.js'

async function chamarProxima() {

  const { data } = await supabase
    .from('fila')
    .select('*')
    .eq('status','aguardando')
    .order('senha',{ascending:true})
    .limit(1)

  if(data.length === 0){
    alert("Nenhuma senha")
    return
  }

  const senha = data[0]

  await supabase
    .from('fila')
    .update({
      status:"chamado",
      hora_chamada: new Date()
    })
    .eq('id', senha.id)

  alert("Chamando senha: " + senha.senha)
}
</script>

<button onclick="chamarProxima()">Chamar Próxima</button>
