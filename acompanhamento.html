<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Terminal</title>
</head>

<body>

<h1>Terminal de Senhas</h1>

<button id="btnRetirar">Retirar Senha</button>

<p id="mensagem"></p>

<script type="module">

import { supabase } from './js/supabase.js'

const btn = document.getElementById("btnRetirar")
const msg = document.getElementById("mensagem")

btn.addEventListener("click", async () => {

msg.textContent = "Gerando senha..."

const { data } = await supabase
.from("fila")
.select("senha")
.order("senha",{ascending:false})
.limit(1)

let proxima = 1

if(data.length>0){
proxima = data[0].senha + 1
}

await supabase
.from("fila")
.insert([{
senha:proxima,
nome:"Paciente",
prioritario:false,
status:"aguardando"
}])

msg.textContent = "Senha gerada: "+proxima

})

</script>

</body>
</html>
