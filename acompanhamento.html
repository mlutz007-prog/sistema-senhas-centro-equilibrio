<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminal</title>
</head>
<body>
  <h1>Terminal de Senhas</h1>

  <button id="btnRetirar">Retirar Senha</button>
  <p id="mensagem"></p>

  <script type="module">
    import { supabase } from './js/supabase.js'

    const btn = document.getElementById('btnRetirar')
    const msg = document.getElementById('mensagem')

    async function gerarSenha() {
      msg.textContent = 'Gerando senha...'

      try {
        const { data, error } = await supabase
          .from('fila')
          .select('senha')
          .order('senha', { ascending: false })
          .limit(1)

        if (error) throw error

        let proxima = 1
        if (data && data.length > 0 && data[0].senha != null) {
          proxima = Number(data[0].senha) + 1
        }

        const { error: insertError } = await supabase
          .from('fila')
          .insert([
            {
              senha: proxima,
              nome: 'Paciente',
              prioritario: false,
              status: 'aguardando',
              hora_chegada: new Date().toISOString()
            }
          ])

        if (insertError) throw insertError

        msg.textContent = 'Senha gerada: ' + proxima
        alert('Senha gerada: ' + proxima)
      } catch (e) {
        console.error(e)
        msg.textContent = 'Erro: ' + e.message
      }
    }

    btn.addEventListener('click', gerarSenha)
  </script>
</body>
</html>
