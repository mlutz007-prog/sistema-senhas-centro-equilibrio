<script type="module">
import { supabase } from './js/supabase.js'

async function gerarSenha() {

  const { data } = await supabase
    .from('fila')
    .select('senha')
    .order('senha', { ascending: false })
    .limit(1)

  let proxima = 1

  if (data.length > 0) {
    proxima = data[0].senha + 1
  }

  await supabase
    .from('fila')
    .insert({
      senha: proxima,
      nome: "Paciente",
      prioritario: false,
      status: "aguardando",
      hora_chegada: new Date()
    })

  alert("Senha gerada: " + proxima)
}
</script>

<button onclick="gerarSenha()">Retirar Senha</button>
